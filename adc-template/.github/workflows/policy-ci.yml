name: Policy CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  quality-security:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        if: ${{ hashFiles('requirements.txt') != '' }}
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        if: ${{ hashFiles('requirements.txt') != '' }}
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pip-audit pytest-cov

      - name: Run tests with coverage gate
        if: ${{ hashFiles('requirements.txt') != '' }}
        run: |
          pytest --cov=src --cov-report=term-missing --cov-fail-under=80

      - name: Enforce vulnerability exception expiry
        if: ${{ hashFiles('requirements.txt') != '' }}
        env:
          VULN_EXCEPTION_ID: CVE-2026-4539
          VULN_EXCEPTION_EXPIRES: "2026-04-15"
        run: |
          TODAY="$(date -u +%F)"
          if [[ "$TODAY" > "$VULN_EXCEPTION_EXPIRES" ]]; then
            echo "Temporary vulnerability exception expired: $VULN_EXCEPTION_ID (expired $VULN_EXCEPTION_EXPIRES)."
            echo "Remove ignore or update dependency to a fixed version."
            exit 1
          fi

      - name: Run dependency vulnerability audit
        if: ${{ hashFiles('requirements.txt') != '' }}
        env:
          VULN_EXCEPTION_ID: CVE-2026-4539
        run: |
          pip-audit -r requirements.txt --ignore-vuln "$VULN_EXCEPTION_ID"

      - name: Skip Python quality/security checks when no requirements.txt
        if: ${{ hashFiles('requirements.txt') == '' }}
        run: echo "No requirements.txt found; skipping Python-specific policy checks."

  pr-policy-checklist:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Validate PR policy checklist text
        env:
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          if [ -z "$PR_BODY" ]; then
            echo "PR body is empty. Fill in the policy checklist in the PR template."
            exit 1
          fi

          echo "$PR_BODY" | grep -qi "JWT/token entropy policy applied" || {
            echo "Missing JWT/token entropy checklist item in PR body."
            exit 1
          }

          echo "$PR_BODY" | grep -qi "Data policy applied for pgvector/sqlite-vec/graph" || {
            echo "Missing data policy checklist item in PR body."
            exit 1
          }
