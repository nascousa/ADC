version: '3.8'

services:
  react:
    image: your-react-build-image:latest
    container_name: react-vite-nginx
    restart: unless-stopped
    ports:
      - '3000:80'
    environment:
      - NODE_ENV=production
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://127.0.0.1/']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - react-network

networks:
  react-network:
    driver: bridge
