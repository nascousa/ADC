version: '3.8'

services:
  metabase:
    image: metabase/metabase:latest
    container_name: metabase-admin
    restart: unless-stopped
    ports:
      - '3001:3000'
    environment:
      - MB_DB_TYPE=postgres
      - MB_DB_HOST=postgres
      - MB_DB_PORT=5432
      - MB_DB_DBNAME=metabase
      - MB_DB_USER=metabase
      - MB_DB_PASS=metabase
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - metabase-network

  postgres:
    image: postgres:16-alpine
    container_name: metabase-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=metabase
      - POSTGRES_USER=metabase
      - POSTGRES_PASSWORD=metabase
    volumes:
      - metabase_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U metabase -d metabase']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - metabase-network

volumes:
  metabase_postgres_data:
    driver: local

networks:
  metabase-network:
    driver: bridge
