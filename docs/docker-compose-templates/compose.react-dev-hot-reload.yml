version: '3.8'

services:
  react-dev:
    image: node:22-alpine
    container_name: react-dev-server
    restart: unless-stopped
    working_dir: /app
    command: ['sh', '-c', 'npm install && npm run dev -- --host 0.0.0.0 --port 5173']
    ports:
      - '5173:5173'
    environment:
      - NODE_ENV=development
      - CHOKIDAR_USEPOLLING=true
      - VITE_API_BASE_URL=http://localhost:8000
    volumes:
      - ./:/app
      - react_node_modules:/app/node_modules
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://127.0.0.1:5173']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    networks:
      - react-dev-network

volumes:
  react_node_modules:
    driver: local

networks:
  react-dev-network:
    driver: bridge
