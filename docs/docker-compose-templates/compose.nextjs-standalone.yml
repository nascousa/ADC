version: '3.8'

services:
  nextjs:
    image: your-nextjs-image:latest
    container_name: nextjs-app
    restart: unless-stopped
    ports:
      - '3002:3000'
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://127.0.0.1:3000']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - nextjs-network

networks:
  nextjs-network:
    driver: bridge
