version: '3.8'

services:
  vue:
    image: your-vue-build-image:latest
    container_name: vue-vite-nginx
    restart: unless-stopped
    ports:
      - '8084:80'
    environment:
      - NODE_ENV=production
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://127.0.0.1/']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - vue-network

networks:
  vue-network:
    driver: bridge
