version: '3.8'

services:
  unleash:
    image: unleashorg/unleash-server:latest
    container_name: unleash-feature-flags
    restart: unless-stopped
    ports:
      - '4242:4242'
    environment:
      - DATABASE_URL=postgres://unleash:unleash@postgres:5432/unleash
      - DATABASE_SSL=false
      - LOG_LEVEL=info
      - INIT_FRONTEND_API_TOKENS=true
      - INIT_CLIENT_API_TOKENS=true
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - feature-flag-network

  postgres:
    image: postgres:16-alpine
    container_name: unleash-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=unleash
      - POSTGRES_USER=unleash
      - POSTGRES_PASSWORD=unleash
    volumes:
      - unleash_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U unleash -d unleash']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - feature-flag-network

volumes:
  unleash_postgres_data:
    driver: local

networks:
  feature-flag-network:
    driver: bridge
