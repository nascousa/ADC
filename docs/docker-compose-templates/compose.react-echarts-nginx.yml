version: '3.8'

services:
  echarts-app:
    image: your-react-echarts-image:latest
    container_name: react-echarts-app
    restart: unless-stopped
    ports:
      - '8087:80'
    environment:
      - NODE_ENV=production
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://127.0.0.1/']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - viz-network

networks:
  viz-network:
    driver: bridge
