version: '3.8'

services:
  nginx:
    image: nginx:alpine
    container_name: flask-nginx
    restart: unless-stopped
    ports:
      - '80:80'
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - flask
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://127.0.0.1/']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - flask-web-network

  flask:
    image: your-flask-image:latest
    container_name: flask-backend
    restart: unless-stopped
    expose:
      - '5000'
    environment:
      - FLASK_ENV=production
      - DATABASE_URL=postgresql://app:app@postgres:5432/appdb
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:5000/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - flask-web-network

  postgres:
    image: postgres:16-alpine
    container_name: flask-web-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=appdb
      - POSTGRES_USER=app
      - POSTGRES_PASSWORD=app
    volumes:
      - flask_web_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U app -d appdb']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - flask-web-network

volumes:
  flask_web_postgres_data:
    driver: local

networks:
  flask-web-network:
    driver: bridge
