version: '3.8'

services:
  react-viz-dev:
    image: node:22-alpine
    container_name: react-echarts-d3-dev
    restart: unless-stopped
    working_dir: /app
    command: ['sh', '-c', 'npm install && npm install echarts d3 && npm run dev -- --host 0.0.0.0 --port 5174']
    ports:
      - '5174:5174'
    environment:
      - NODE_ENV=development
      - CHOKIDAR_USEPOLLING=true
    volumes:
      - ./:/app
      - react_viz_node_modules:/app/node_modules
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://127.0.0.1:5174']
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 40s
    networks:
      - viz-dev-network

volumes:
  react_viz_node_modules:
    driver: local

networks:
  viz-dev-network:
    driver: bridge
