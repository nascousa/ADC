version: '3.8'

services:
  api:
    image: your-express-image:latest
    container_name: express-mongo-api
    restart: unless-stopped
    ports:
      - '8002:8000'
    environment:
      - NODE_ENV=production
      - PORT=8000
      - MONGODB_URI=mongodb://mongo:27017/appdb
    depends_on:
      mongo:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://127.0.0.1:8000/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - express-network

  mongo:
    image: mongo:7
    container_name: express-mongo-db
    restart: unless-stopped
    volumes:
      - express_mongo_data:/data/db
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', 'db.adminCommand("ping")']
      interval: 20s
      timeout: 10s
      retries: 5
    networks:
      - express-network

volumes:
  express_mongo_data:
    driver: local

networks:
  express-network:
    driver: bridge
