version: '3.8'

services:
  frontend:
    image: your-vue-frontend-image:latest
    container_name: vue-frontend
    restart: unless-stopped
    ports:
      - '8085:80'
    environment:
      - VITE_API_BASE_URL=http://api:8000
    depends_on:
      - api
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://127.0.0.1/']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - fullstack-network

  api:
    image: your-express-image:latest
    container_name: vue-express-api
    restart: unless-stopped
    expose:
      - '8000'
    environment:
      - NODE_ENV=production
      - PORT=8000
      - DATABASE_URL=postgresql://app:app@postgres:5432/appdb
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://127.0.0.1:8000/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - fullstack-network

  postgres:
    image: postgres:16-alpine
    container_name: vue-express-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=appdb
      - POSTGRES_USER=app
      - POSTGRES_PASSWORD=app
    volumes:
      - vue_express_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U app -d appdb']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fullstack-network

  redis:
    image: redis:7-alpine
    container_name: vue-express-redis
    restart: unless-stopped
    command: ['redis-server', '--appendonly', 'yes']
    volumes:
      - vue_express_redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - fullstack-network

volumes:
  vue_express_postgres_data:
    driver: local
  vue_express_redis_data:
    driver: local

networks:
  fullstack-network:
    driver: bridge
