version: '3.8'

services:
  clamav:
    image: clamav/clamav:latest
    container_name: clamav-service
    restart: unless-stopped
    ports:
      - '3310:3310'
    volumes:
      - clamav_db:/var/lib/clamav
      - ./uploads:/scan:ro
    networks:
      - security-network

  scanner:
    image: alpine:latest
    container_name: clamav-scanner
    profiles: ['manual-scan']
    command: ['sh', '-c', 'apk add --no-cache clamav clamav-libunrar && clamscan -r /scan']
    volumes:
      - ./uploads:/scan:ro
    depends_on:
      - clamav
    networks:
      - security-network

volumes:
  clamav_db:
    driver: local

networks:
  security-network:
    driver: bridge
