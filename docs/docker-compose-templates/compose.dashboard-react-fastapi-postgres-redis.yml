version: '3.8'

services:
  frontend:
    image: your-dashboard-frontend-image:latest
    container_name: dashboard-react-frontend
    restart: unless-stopped
    ports:
      - '3020:3000'
    environment:
      - NODE_ENV=production
      - VITE_API_BASE_URL=http://api:8000
    depends_on:
      - api
    healthcheck:
      test: ['CMD', 'wget', '--no-verbose', '--tries=1', '--spider', 'http://127.0.0.1:3000']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - dashboard-network

  api:
    image: your-dashboard-fastapi-image:latest
    container_name: dashboard-fastapi-api
    restart: unless-stopped
    expose:
      - '8000'
    environment:
      - ENVIRONMENT=production
      - DATABASE_URL=postgresql://app:app@postgres:5432/dashboard
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ['uvicorn', 'app.main:app', '--host', '0.0.0.0', '--port', '8000', '--workers', '2']
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:8000/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - dashboard-network

  postgres:
    image: postgres:16-alpine
    container_name: dashboard-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_DB=dashboard
      - POSTGRES_USER=app
      - POSTGRES_PASSWORD=app
    volumes:
      - dashboard_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U app -d dashboard']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dashboard-network

  redis:
    image: redis:7-alpine
    container_name: dashboard-redis
    restart: unless-stopped
    command: ['redis-server', '--appendonly', 'yes']
    volumes:
      - dashboard_redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - dashboard-network

volumes:
  dashboard_postgres_data:
    driver: local
  dashboard_redis_data:
    driver: local

networks:
  dashboard-network:
    driver: bridge
